{# Yasal ürün alanları — tüm ürünlerde mevcut, hepsi isteğe bağlı #}
<div class="legal-section-box">
    <div class="legal-section-head">
        <span><i class="fas fa-scale-balanced"></i> Ürün Bilgileri (İsteğe Bağlı)</span>
        <small>Doldurmak istediğiniz alanları girin — boş bıraktıklarınız menüde görünmez</small>
    </div>

    <div class="legal-fields-grid">
        <div class="field-block">
            <label class="field-label">Kalori</label>
            <div class="input-suffix-wrap">
                <input type="number" name="calorie" min="1"
                       value="{{ urun.calorie if urun and urun.calorie else '' }}"
                       placeholder="Boş bırakılabilir">
                <span class="input-suffix">kcal</span>
            </div>
        </div>
        <div class="field-block">
            <label class="field-label">Gramaj / Porsiyon</label>
            <input type="text" name="portion_weight"
                   value="{{ urun.portion_weight if urun and urun.portion_weight else '' }}"
                   placeholder="Boş bırakılabilir">
        </div>
        <div class="field-block">
            <label class="field-label">Et Kökeni / Karışım</label>
            <input type="text" name="meat_origin"
                   value="{{ urun.meat_origin if urun and urun.meat_origin else '' }}"
                   placeholder="Boş bırakılabilir">
        </div>
    </div>

    <div class="alcohol-switch-wrap">
        <label>
            <input type="checkbox" name="contains_alcohol"
                   {% if urun and urun.contains_alcohol %}checked{% endif %}>
            Alkol İçerir
        </label>
    </div>

    <div class="allergen-section">
        <div class="allergen-section-label"><i class="fas fa-triangle-exclamation"></i> Alerjenler (varsa işaretleyin)</div>
        <div class="allergen-grid">
            {% for value, label in standard_allergens %}
            <label class="allergen-cb-label{% if urun and urun.allergens and value in urun.allergens %} checked{% endif %}"
                   onclick="toggleAllergenChip(this)">
                <input type="checkbox" name="allergens" value="{{ value }}"
                       {% if urun and urun.allergens and value in urun.allergens %}checked{% endif %}>
                <span>{{ label }}</span>
            </label>
            {% endfor %}
        </div>
    </div>
</div>
